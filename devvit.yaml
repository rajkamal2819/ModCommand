name: modcommand
version: 0.1.0
permissions:
  - reddit.modQueue
  - reddit.modActions
  - reddit.modNotes
  - reddit.bans
  - reddit.modmail
  - http
  - storage.redis
settings:
  - name: geminiApiKey
    label: Gemini API Key
    description: Your Google AI Studio API key for AI features
    type: string
    isSecret: true
  - name: aigcThreshold
    label: AI Detection Threshold (0-100)
    description: Posts scoring above this threshold will be flagged
    type: number
    defaultValue: 70
  - name: appealFormEnabled
    label: Enable Appeal Desk intake form
    type: boolean
    defaultValue: true
  - name: digestDay
    label: Weekly digest day (0=Sunday, 1=Monday, ... 6=Saturday)
    type: number
    defaultValue: 1
